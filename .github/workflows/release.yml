# Manual release: validate, then version + publish to GitHub Packages (npm).
# Trigger via Actions → Release → "Run workflow". Choose "alpha" (prerelease) or "stable" (graduate).
# Requires GITHUB_TOKEN (default) with contents + packages write; optional TURBO_TOKEN/TURBO_TEAM for remote cache.

name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'next'
        type: choice
        options:
          - next
          - alpha
          - beta
          - rc
          - stable

permissions:
  contents: write # push version commit and tags
  packages: write # publish to GitHub Packages
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Validate and publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.head_commit.author.name != 'machine-user' # prevent loop
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # full history for Lerna conventional-commits versioning
          ssh-key: ${{ secrets.AUTORELEASE_KEY }}
      - name: ⚙️ Setup
        uses: w5s/actions/setup@36884633720189a7a91a77488ed6fe03b127cff7 # main
      - name: 🔨 Build
        uses: w5s/actions/task@36884633720189a7a91a77488ed6fe03b127cff7 # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@36884633720189a7a91a77488ed6fe03b127cff7 # main
        with:
          task: validate

      - name: 🚀 Publish
        uses: w5s/actions/task@36884633720189a7a91a77488ed6fe03b127cff7 # main
        with:
          task: release
        env:
          # GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Not required we use trusted publishing
          # NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CI_RELEASE_TYPE: ${{ github.event.inputs.release_type || 'next' }}
