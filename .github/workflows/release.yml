# Manual release: validate, then version + publish to GitHub Packages (npm).
# Trigger via Actions → Release → "Run workflow". Choose "alpha" (prerelease) or "stable" (graduate).
# Requires GITHUB_TOKEN (default) with contents + packages write; optional TURBO_TOKEN/TURBO_TEAM for remote cache.

name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'alpha'
        type: choice
        options:
          - next
          - alpha
          - beta
          - rc
          - stable

permissions:
  contents: write # push version commit and tags
  packages: write # publish to GitHub Packages
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Validate and publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.head_commit.author.name != 'machine-user' # prevent loop
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # full history for Lerna conventional-commits versioning
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: ⚙️ Setup
        uses: w5s/actions/setup@db51e484ccb8db9a93a875a5b3e31148465363c4 # main
      - name: 🔨 Build
        uses: w5s/actions/task@db51e484ccb8db9a93a875a5b3e31148465363c4 # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@db51e484ccb8db9a93a875a5b3e31148465363c4 # main
        with:
          task: validate

      - name: 🚀 Publish
        uses: w5s/actions/task@db51e484ccb8db9a93a875a5b3e31148465363c4 # main
        with:
          task: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CI_RELEASE_TYPE: ${{ github.event.inputs.release_type || 'next' }}
