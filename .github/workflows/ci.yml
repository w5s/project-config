name: CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: ⚙️ Setup
        uses: w5s/actions/setup@4fdb2ba946f9e26638172bcba05e9958fe6c7d22 # main
      - name: 🔨 Build
        uses: w5s/actions/task@4fdb2ba946f9e26638172bcba05e9958fe6c7d22 # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@4fdb2ba946f9e26638172bcba05e9958fe6c7d22 # main
        with:
          task: validate
