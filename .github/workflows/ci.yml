name: CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  actions: read
  code-quality: write
  contents: read
  packages: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: ⚙️ Setup
        uses: w5s/actions/setup@e3fa45a4cbbf9e7abe3f39158ce73c291b55ae2c # main
      - name: 🔨 Build
        uses: w5s/actions/task@e3fa45a4cbbf9e7abe3f39158ce73c291b55ae2c # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@e3fa45a4cbbf9e7abe3f39158ce73c291b55ae2c # main
        with:
          task: validate
