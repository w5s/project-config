name: CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: ⚙️ Setup
        uses: w5s/actions/setup@d7171ed05b6e84c4b60603ffb9f7374c0dd7b62a # main
      - name: 🔨 Build
        uses: w5s/actions/task@d7171ed05b6e84c4b60603ffb9f7374c0dd7b62a # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@d7171ed05b6e84c4b60603ffb9f7374c0dd7b62a # main
        with:
          task: validate
