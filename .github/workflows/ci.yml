name: CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: ⚙️ Setup
        uses: w5s/actions/setup@9b32fc627e40df8b78d74a5a3b78779b1dc15953 # main
      - name: 🔨 Build
        uses: w5s/actions/task@9b32fc627e40df8b78d74a5a3b78779b1dc15953 # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@9b32fc627e40df8b78d74a5a3b78779b1dc15953 # main
        with:
          task: validate
