name: CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: ⚙️ Setup
        uses: w5s/actions/setup@d9c3ceb1ab8c736418d326f5d8bc6f58793ce90d # main
      - name: 🔨 Build
        uses: w5s/actions/task@d9c3ceb1ab8c736418d326f5d8bc6f58793ce90d # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@d9c3ceb1ab8c736418d326f5d8bc6f58793ce90d # main
        with:
          task: validate
