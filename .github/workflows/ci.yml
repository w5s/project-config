name: CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: ⚙️ Setup
        uses: w5s/actions/setup@35a543aae42f757bc5495867fb9aca272fab69bc # main
      - name: 🔨 Build
        uses: w5s/actions/task@35a543aae42f757bc5495867fb9aca272fab69bc # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@35a543aae42f757bc5495867fb9aca272fab69bc # main
        with:
          task: validate
