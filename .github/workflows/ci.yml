name: CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: ⚙️ Setup
        uses: w5s/actions/setup@327713b2910182f43ee7089d250f655baf4e5df2 # main
      - name: 🔨 Build
        uses: w5s/actions/task@327713b2910182f43ee7089d250f655baf4e5df2 # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@327713b2910182f43ee7089d250f655baf4e5df2 # main
        with:
          task: validate
