name: Make CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: ⚙️ Setup
        uses: w5s/actions/setup@94c87cb54f7536e0b34eb31c2e71bd6cda6ecd9d # main
      - name: 🔨 Build
        uses: w5s/actions/task@94c87cb54f7536e0b34eb31c2e71bd6cda6ecd9d # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@94c87cb54f7536e0b34eb31c2e71bd6cda6ecd9d # main
        with:
          task: validate
