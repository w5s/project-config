name: CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: ⚙️ Setup
        uses: w5s/actions/setup@da4d4d1c927ee035172c95e7675b3a4efd656a96 # main
      - name: 🔨 Build
        uses: w5s/actions/task@da4d4d1c927ee035172c95e7675b3a4efd656a96 # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@da4d4d1c927ee035172c95e7675b3a4efd656a96 # main
        with:
          task: validate
