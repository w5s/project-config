name: Make CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: ⚙️ Setup
        uses: w5s/actions/setup@7bb6e4f97f2d0a438d6994f4c4bfec3f5d88f7ac # main
      - name: 🔨 Build
        uses: w5s/actions/task@7bb6e4f97f2d0a438d6994f4c4bfec3f5d88f7ac # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@7bb6e4f97f2d0a438d6994f4c4bfec3f5d88f7ac # main
        with:
          task: validate
