name: CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: ⚙️ Setup
        uses: w5s/actions/setup@47c1768a9788cd77e84e8657d9b23993bd5e613b # main
      - name: 🔨 Build
        uses: w5s/actions/task@47c1768a9788cd77e84e8657d9b23993bd5e613b # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@47c1768a9788cd77e84e8657d9b23993bd5e613b # main
        with:
          task: validate
