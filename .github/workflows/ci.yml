name: CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: ⚙️ Setup
        uses: w5s/actions/setup@8b576169b9ea5914f15881f5781cb423f3d235f3 # main
      - name: 🔨 Build
        uses: w5s/actions/task@8b576169b9ea5914f15881f5781cb423f3d235f3 # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@8b576169b9ea5914f15881f5781cb423f3d235f3 # main
        with:
          task: validate
