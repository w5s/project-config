name: Make CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: ⚙️ Setup
        uses: w5s/actions/setup@ab0613fc55b907f059b4056346f4a0ea80021bb4 # main
      - name: 🔨 Build
        uses: w5s/actions/task@ab0613fc55b907f059b4056346f4a0ea80021bb4 # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@ab0613fc55b907f059b4056346f4a0ea80021bb4 # main
        with:
          task: validate
