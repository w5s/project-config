name: CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: ⚙️ Setup
        uses: w5s/actions/setup@73547e1b7b9c981c7cfd97223375139c57badf0c # main
      - name: 🔨 Build
        uses: w5s/actions/task@73547e1b7b9c981c7cfd97223375139c57badf0c # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@73547e1b7b9c981c7cfd97223375139c57badf0c # main
        with:
          task: validate
