name: CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: ⚙️ Setup
        uses: w5s/actions/setup@280dc5b0060a2fdf6a6da68325f7205a105f7e83 # main
      - name: 🔨 Build
        uses: w5s/actions/task@280dc5b0060a2fdf6a6da68325f7205a105f7e83 # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@280dc5b0060a2fdf6a6da68325f7205a105f7e83 # main
        with:
          task: validate
