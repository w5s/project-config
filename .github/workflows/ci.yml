name: CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read
  packages: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: ⚙️ Setup
        uses: w5s/actions/setup@90bf2df3a27e77244fb08b3a4501d9b6ba619d34 # main
      - name: 🔨 Build
        uses: w5s/actions/task@90bf2df3a27e77244fb08b3a4501d9b6ba619d34 # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@90bf2df3a27e77244fb08b3a4501d9b6ba619d34 # main
        with:
          task: validate
